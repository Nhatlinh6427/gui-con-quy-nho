<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Gửi Người Anh Thương</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>


<audio id="music" loop>
    <source src="music/vay-cuoi.mp3" type="audio/mpeg">
</audio>


<div id="hearts"></div>

<div id="flowers"></div>


<canvas id="fireworks"></canvas>


<div id="welcome">

<h1 class="title">
💖 Có một điều anh muốn nói...
</h1>

<p class="subtitle">
Hãy mở lá thư này nhé ❤️
</p>

<div class="envelope" id="envelope">

<div class="cover"></div>

<div class="paper">

<h2>💌</h2>

<p>
Nhấn để mở
</p>

</div>

</div>

</div>


<div id="letter">

<div class="card">

<h1>💌 Gửi em</h1>

<div id="typing"></div>

<button id="loveBtn">

❤️ Anh yêu em ❤️

</button>

</div>

</div>

<script>

const message=`

Chào em ❤️

Nếu em đang đọc những dòng này...

Có lẽ đây là điều anh đã muốn nói từ rất lâu.

Cảm ơn em vì đã xuất hiện trong cuộc đời anh.

Từ ngày có em...

Mọi thứ đều trở nên đẹp hơn.

Anh thích nhìn em cười.

Thích được nhắn tin với em.

Thích được quan tâm em mỗi ngày.

Anh không hứa sẽ hoàn hảo.

Nhưng anh hứa sẽ luôn cố gắng để làm em hạnh phúc.

Hy vọng...

Chúng ta sẽ còn cùng nhau đi rất nhiều nơi.

Cùng nhau ăn những món ngon.

Cùng nhau ngắm hoàng hôn.

Cùng nhau già đi.

Anh yêu em rất nhiều ❤️

`;

</script>

<script src="script.js"></script>

</body>
</html>
